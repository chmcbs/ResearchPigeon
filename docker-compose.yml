services:
  db:
    image: pgvector/pgvector:pg16
    container_name: arxiv-assistant-db
    environment:
      POSTGRES_DB: arxiv_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arxiv_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    container_name: arxiv-assistant-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arxiv_assistant
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
