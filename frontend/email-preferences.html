<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email preferences - arXiv Assistant</title>
  <link rel="stylesheet" href="/static/styles.css?v=13">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">arXiv Assistant</a>
  </header>

  <main class="container">
    <section class="panel email-preferences-panel">
      <h1 id="email-preferences-title">Email preferences</h1>
      <p id="email-preferences-message" class="muted"></p>
      <p id="email-preferences-actions" class="email-preferences-actions hidden">
        <a id="email-preferences-resubscribe" class="link-btn" href="#">Turn digest emails back on</a>
      </p>
      <p class="email-preferences-footer muted">
        <a href="/profiles">Manage profiles</a>
      </p>
    </section>
  </main>

  <script src="/static/email-preferences.js"></script>
</body>
</html>
